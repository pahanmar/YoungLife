# Nginx config template for `younglife-russia.ru`
#
# Assumptions:
# - Your docker-compose maps:
#   - frontend to 127.0.0.1:5173
#   - backend to 127.0.0.1:4000
# - This file is placed under your Nginx enabled sites (or conf.d).
# - Certbot will manage the SSL certs under /etc/letsencrypt/live/<domain>/...

server {
  listen 80;
  listen [::]:80;
  server_name younglife-russia.ru;

  # Let’s Encrypt HTTP-01 challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect all other traffic to HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name younglife-russia.ru;

  ssl_certificate /etc/letsencrypt/live/younglife-russia.ru/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/younglife-russia.ru/privkey.pem;

  # These files are created by certbot (on Debian/Ubuntu).
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  client_max_body_size 20M;

  # Backend: keep /api/... and /uploads/... paths intact.
  location /api/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Frontend (Vite dev server):
  # - supports websockets (React Router / HMR)
  location / {
    proxy_pass http://127.0.0.1:5173;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

