version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: younglife
      POSTGRES_PASSWORD: younglifepass
      POSTGRES_DB: younglife_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    # В проде не публикуем Postgres наружу
    ports: []

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://younglife:younglifepass@postgres:5432/younglife_db
      # Админ создаётся сидом только если вы ЯВНО зададите оба значения в /opt/YoungLife/.env
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PWD: ${SEED_ADMIN_PWD:-}
      JWT_SECRET: ${JWT_SECRET:-younglife-jwt-secret-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-https://younglife-russia.ru}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://younglife-russia.ru}
      NODE_ENV: production
    depends_on:
      - postgres
    # В проде не публикуем backend наружу (только localhost, чтобы проксировал хостовый nginx)
    ports:
      - "127.0.0.1:4000:4000"
    volumes: []

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    # Контейнерный nginx слушает 80, наружу отдаём на localhost:8080
    ports:
      - "127.0.0.1:8080:80"
    volumes: []

volumes:
  pgdata:
