version: "3.8"

services:
  postgres:
    # В проде не публикуем Postgres наружу
    ports: []

  backend:
    # В проде не публикуем backend наружу (только localhost, чтобы проксировал хостовый nginx)
    ports:
      - "127.0.0.1:4000:4000"
    # В проде не монтируем исходники, работаем из образа
    volumes: []
    environment:
      NODE_ENV: production

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    # Контейнерный nginx слушает 80, наружу отдаём на localhost:5173
    ports:
      - "127.0.0.1:5173:80"
    volumes: []
