version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: younglife
      POSTGRES_PASSWORD: younglifepass
      POSTGRES_DB: younglife_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DATABASE_URL: postgresql://younglife:younglifepass@postgres:5432/younglife_db
      SEED_ADMIN_EMAIL: admin@younglife.local
      SEED_ADMIN_PWD: admin123
      JWT_SECRET: ${JWT_SECRET:-younglife-jwt-secret-change-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      - postgres
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app:delegated
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules

volumes:
  pgdata:
  backend_node_modules:
