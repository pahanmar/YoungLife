version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: younglife
      POSTGRES_PASSWORD: younglifepass
      POSTGRES_DB: younglife_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      - postgres
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app:delegated
      - /app/node_modules

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules

volumes:
  pgdata: